services:
  - type: web
    name: studypal-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_ORIGIN
        value: https://studypal-frontend.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 7
      - key: COOKIE_SAME_SITE
        value: none
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: OLLAMA_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: qwen2.5:1.5b
      - key: EMBEDDING_MODEL
        value: Xenova/nomic-embed-text-v1
      - key: SERPER_API_KEY
        sync: false
      - key: BREVO_SMTP_HOST
        value: smtp-relay.brevo.com
      - key: BREVO_SMTP_PORT
        value: 587
      - key: BREVO_SMTP_SECURE
        value: false
      - key: BREVO_SMTP_USER
        sync: false
      - key: BREVO_SMTP_PASS
        sync: false
      - key: BREVO_SMTP_FROM
        value: StudyPal <you@example.com>

  - type: web
    name: studypal-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      # Replace this with your actual backend URL if you rename the backend service.
      - key: VITE_API_URL
        value: https://studypal-backend.onrender.com
